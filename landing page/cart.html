<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kova Cart</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="css/stylesheet.css">

  <link rel="stylesheet" href="css/cart.css">

  <link rel="icon" type="image/png" href="images/fevicon.png">

  <style>
    
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="landing_page.html">
      <img src="images/logo.png">
    </a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav mx-auto gap-2">
        <li class="nav-item"><a class="nav-link" href="#">Shop</a></li>
        <li class="nav-item"><a class="nav-link" href="offer.html">Offer</a></li>
        <li class="nav-item"><a class="nav-link" href="gifting.html">Gifting</a></li>
        <li class="nav-item"><a class="nav-link" href="about_us.html">About Us</a></li>
      </ul>
      <div class="nav-icons d-flex align-items-center">
        <a href="profile.html"><i class="bi bi-person"></i></a>
        <a href="cart.html"><i class="bi bi-bag"></i></a>
      </div>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero-section">
  <div class="container text-center">
    <h1 class="hero-title">Your Cart</h1>
    <p class="hero-desc">Review your items before checkout</p>
  </div>
</section>

<!-- CART CONTENT -->
<section class="love-section">
  <div class="container">
    <div class="row g-4">

      <!-- LEFT: ITEMS -->
      <div class="col-lg-8">

        <!-- ITEM 1 -->
        <div class="cart-card d-flex align-items-center gap-3">
          <img src="images/bottle_love.png" class="cart-img">

          <div class="flex-grow-1">
            <h6 class="cart-title">Kova Elixir</h6>
            <p class="mb-1">Signature Blend</p>

            <div class="d-flex align-items-center gap-2">
              <button class="qty-btn">−</button>
              <input class="qty-input" type="text" value="1" readonly>
              <button class="qty-btn">+</button>
            </div>
          </div>

          <div class="cart-price">₹449</div>

          <button class="btn btn-sm text-danger">
            <i class="bi bi-trash"></i>
          </button>
        </div>

        <!-- ITEM 2 -->
        <div class="cart-card d-flex align-items-center gap-3">
          <img src="images/pouch.png" class="cart-img">

          <div class="flex-grow-1">
            <h6 class="cart-title">Morning Reserve</h6>
            <p class="mb-1">Premium Beans</p>

            <div class="d-flex align-items-center gap-2">
              <button class="qty-btn">−</button>
              <input class="qty-input" type="text" value="2" readonly>
              <button class="qty-btn">+</button>
            </div>
          </div>

          <div class="cart-price">₹598</div>

          <button class="btn btn-sm text-danger">
            <i class="bi bi-trash"></i>
          </button>
        </div>

      </div>

      <!-- RIGHT: SUMMARY -->
      <div class="col-lg-4">
        <div class="summary-box">

          <h5 class="mb-3">Order Summary</h5>

          <div class="d-flex justify-content-between mb-2">
            <span>Subtotal</span>
            <span>₹1047</span>
          </div>

          <div class="d-flex justify-content-between mb-2">
            <span>Discount</span>
            <span>-₹100</span>
          </div>

          <div class="d-flex justify-content-between mb-3">
            <span>Delivery</span>
            <span>Free</span>
          </div>

          <hr>

          <div class="d-flex justify-content-between mb-3">
            <strong>Total</strong>
            <strong>₹947</strong>
          </div>

          <button class="checkout-btn">Proceed to Checkout</button>

        </div>
      </div>

    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="text-center p-3">
  © 2026 Kova. All rights reserved.
</footer>

<script>
  document.querySelectorAll('.qty-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = btn.parentElement.querySelector('.qty-input');
      let v = parseInt(input.value) || 1;
      if (btn.textContent === '+') v++;
      if (btn.textContent === '−') v = Math.max(1, v - 1);
      input.value = v;
    });
  });
</script>

</body>
</html>
